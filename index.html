<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C.T.R.L.</title>
<style>
body {margin:0;font-family:Arial, sans-serif;background:#0a0a0a;color:#fff;overflow:hidden;}
nav {display:flex;justify-content:space-between;padding:20px;background:rgba(0,0,0,0.6);position:sticky;top:0;backdrop-filter:blur(10px);} 
nav a {color:#fff;text-decoration:none;margin:0 10px;transition:0.3s;}
nav a:hover {color:#a64cff;}
.hero {height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.hero h1 {font-size:3rem;letter-spacing:2px;}
.hero p {font-size:1.5rem;letter-spacing:4px;margin-top:10px;}
.btn {padding:25px 50px;border:2px solid #a64cff;margin-top:60px;cursor:pointer;transition:0.5s;font-size:1.3rem;border-radius:30px;position:relative;overflow:hidden;color:#fff;background:rgba(0,0,0,0.3);}
.btn::before {content:'';position:absolute;top:50%;left:50%;width:0;height:0;background:rgba(166,76,255,0.4);border-radius:50%;transform:translate(-50%, -50%);transition:0.5s;}
.btn:hover::before {width:300%; height:300%;}
canvas {position:fixed;top:0;left:0;z-index:-1;}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<nav>
<div>CTRL</div>
<div>
<a href="/index.html">Home</a>
<a href="/pages/projects.html">Projects</a>
<a href="/pages/contact.html">Contact</a>
</div>
</nav>
<div class="hero">
<h1>CTRL</h1>
<p>Create • Test • Retry • Launch</p>
<a class="btn" href="/projects.html">View Projects</a>
</div>
<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let mouse = {x: null, y: null};
window.addEventListener('mousemove', e => { if(window.innerWidth>768){mouse.x = e.x; mouse.y = e.y;} });
class Particle {
  constructor(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.size = Math.random()*2+1;
    this.speedX = (Math.random()-0.5)*0.3;
    this.speedY = (Math.random()-0.5)*0.3;
  }
  update(){
    this.x += this.speedX; this.y += this.speedY;
    if(this.x<0) this.x=canvas.width; if(this.x>canvas.width) this.x=0;
    if(this.y<0) this.y=canvas.height; if(this.y>canvas.height) this.y=0;
    if(mouse.x!==null && mouse.y!==null){
      let dx=this.x-mouse.x; let dy=this.y-mouse.y;
      let dist=Math.sqrt(dx*dx + dy*dy);
      if(dist<200){this.x += (dx/dist)*2; this.y += (dy/dist)*2;}
    }
  }
  draw(){ctx.fillStyle='#a64cff';ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();}
}
let particlesArray=[]; for(let i=0;i<200;i++){particlesArray.push(new Particle());}
function animate(){ctx.clearRect(0,0,canvas.width,canvas.height); particlesArray.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(animate);}
animate();
window.addEventListener('resize',()=>{canvas.width=window.innerWidth; canvas.height=window.innerHeight;});
</script>
